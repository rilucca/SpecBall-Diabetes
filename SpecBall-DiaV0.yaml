substitutions:
  name: specballdiabetes
  friendly_name: "SpecBallDiaV0"

  # Display settings for SpecBall S2 (Round Screen)
  imagewidth: "240" 
  imageheight: "240"
  displaymodel: "GC9A01A"
  invertcolors: "true"
  
 # Simplified for Diabetes (0-9, units, and arrows)
  allowed_characters: "0123456789.,↑↓→↗↘ -:!%?ABCDEFGHIJKLMNÑOPQRSTUVWXYZabcdefghijklmnñopqrstuvwxyzáéíóúü"
  font_glyphsets: "GF_Latin_Core"
  font_family: "Figtree"

  # Hardware v2 pin mappings
  sda_pin_bus_a: "15"        # I2C Bus A SDA
  scl_pin_bus_a: "14"        # I2C BUS A SCL
  sda_pin_bus_b: "11"        # I2C Bus B SDA
  scl_pin_bus_b: "7"         # I2C BUS B SCL

  i2s_lrclk_pin: "45"        # I2S LRCLK (Word Select)
  i2s_bclk_pin: "9"          # I2S BCLK (Bit Clock)
  i2s_mclk_pin: "16"         # I2S MCLK (Master Clock)
  i2s_din_pin: "10"          # I2S Data In (Mic)
  i2s_dout_pin: "8"          # I2S Data Out (Speaker)

  speaker_enable_pin: "46"   # Speaker Enable
  touch_input_pin: "12"      # Touch interrupt
  touch_reset_pin: "6"       # Touch Reset

  backlight_output_pin: "42" # Display Backlight
  lcd_cs_pin: "5"            # Display CS (Chip Select)
  lcd_dc_pin: "47"           # Display DC (Data/Command)
  lcd_reset_pin: "38"        # Display Reset
  spi_clk_pin: "4"           # SPI Clock
  spi_mosi_pin: "2"          # SPI MOSI (Data Out)

  left_top_button_pin: "0"   # Main Button
  led_pin: "48"              # RGB LED (WS2812)
  battery_adc_pin: "1"       # Battery Voltage ADC

spi:
  id: spi_bus
  clk_pin: GPIO${spi_clk_pin}
  mosi_pin: GPIO${spi_mosi_pin}

i2c:
  - id: bus_a
    sda: GPIO${sda_pin_bus_a}
    scl: GPIO${scl_pin_bus_a}
    scan: true
  - id: bus_b
    sda: GPIO${sda_pin_bus_b}
    scl: GPIO${scl_pin_bus_b}
    scan: true

i2s_audio:
  - id: i2s_audio_bus  # <--- Asegúrate de que este ID sea exactamente así
    i2s_lrclk_pin: GPIO${i2s_lrclk_pin}
    i2s_bclk_pin: GPIO${i2s_bclk_pin}


# 1. El DAC ES8311 (Se conecta vía I2C)
audio_dac:
  - platform: es8311
    id: es8311_dac
    i2c_id: bus_a 
    address: 0x18 # Dirección estándar del ES8311
    bits_per_sample: 16bit
    sample_rate: 16000

# 2. El Micrófono (Si quieres dejarlo listo, aunque no lo usemos para diabetes)
microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_audio_id: i2s_audio_bus
    i2s_din_pin: GPIO${i2s_din_pin}
    adc_type: external
    bits_per_sample: 16bit
    pdm: false

# 3. El Altavoz (El que dará las alertas de glucosa)
speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    i2s_audio_id: i2s_audio_bus
    i2s_dout_pin: GPIO${i2s_dout_pin}
    dac_type: external
    audio_dac: es8311_dac # <--- Esto lo vincula con el bloque de arriba
    i2s_mode: primary

    
# 4. Backlight Control
output:
  - platform: ledc
    pin: GPIO${backlight_output_pin}
    id: backlight_output
    inverted: true

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  includes:
    - nightscout.h
  min_version: 2025.5.0
  name_add_mac_suffix: false
  on_boot:
    priority: 600
    then:
      # 1. Registramos el código de Nightscout para que empiece a funcionar
      - lambda: 'App.register_component(NightscoutComponent::instance());'
      
      # 2. Refrescamos la pantalla y la batería
      - script.execute: draw_display
      - component.update: battery_voltage
      - component.update: battery_percentage
      
      # 3. Esperamos a que el WiFi conecte y baje la primera glucosa
      - delay: 15s # Bajamos de 30s a 15s para que sea más rápido
      
      # 4. Quitamos el logo de inicio y mostramos la glucosa real
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lambda: id(init_in_progress) = false;
            - script.execute: draw_display

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz

api:
  encryption:
    key: !secret api_encryption_key
  on_client_connected:
    - script.execute: draw_display
  on_client_disconnected:
    - script.execute: draw_display

ota:
  - platform: esphome
    id: ota_esphome

logger:
  hardware_uart: USB_SERIAL_JTAG

wifi:
  networks:
  - ssid: !secret wifi_ssid
    password: !secret wifi_password

  fast_connect: false    #for unified routers
  power_save_mode: NONE  #For unified 2.4/5Ghz routers
  ap:
    ssid: "Ball v2 Hotspot"
    password: "RZ7D3EzJdPM6"
  on_connect:
    - script.execute: draw_display
  on_disconnect:
    - script.execute: draw_display

captive_portal:

button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true
  - platform: restart
    name: "Restart SpecBall"
    id: restart_button # Now it's a true button

sensor:
  # Sensor de Glucosa (SGV)
  - platform: template
    name: "Glucose mg-dL"
    id: sgv_val
    unit_of_measurement: "mg-dL"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: 'return NightscoutComponent::instance()->sgv_sensor->state;'

  # Hardware Battery Sensor
  - platform: adc
    pin: GPIO${battery_adc_pin}
    name: "Battery Voltage"
    id: battery_voltage
    attenuation: 12db
    update_interval: 1min # Save power, 1s is too fast
    filters:
      - multiply: 2.0
      - median:
          window_size: 5

  # Otros datos de Nightscout
  - platform: template
    name: "IOB"
    id: iob_val
    unit_of_measurement: "U"
    accuracy_decimals: 2
    update_interval: 60s
    lambda: 'return NightscoutComponent::instance()->iob_sensor->state;'

  - platform: template
    name: "COB"
    id: cob_val
    unit_of_measurement: "g"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: 'return NightscoutComponent::instance()->cob_sensor->state;'

  # Battery Percentage Calculation
  - platform: template
    id: battery_percentage
    name: "Battery Percentage"
    unit_of_measurement: "%"
    lambda: |-
      float v = id(battery_voltage).state;
      if (v >= 4.2) return 100.0;
      if (v <= 3.2) return 0.0;
      return (v - 3.2) * 100.0; // Simple linear math for now
    on_value:
      then:
        - lambda: 'id(last_battery_percent) = (int)x;'
        - component.update: s3_box_lcd # Refreshes screen with new bat %

touchscreen:
  - platform: cst816
    i2c_id: bus_b
    interrupt_pin: ${touch_input_pin}
    reset_pin: ${touch_reset_pin}
    id: touch_dp
    on_touch:
      then:
        # 1. NEW: Mute the Alarm and Turn off the Light Star
        - lambda: 'id(alarm_muted) = true;'
        - light.turn_off: led_rgb
        # 2. Existing functionality:
        - binary_sensor.template.publish:
            id: touch_input
            state: ON
    on_release:
      then:
        - binary_sensor.template.publish:
            id: touch_input
            state: OFF
binary_sensor:
  - platform: template
    name: "Touch Button"
    id: touch_input
    on_multi_click:
      # Un toque corto: Silenciar alarma y refrescar datos
      - timing:
          - ON for 40ms to 400ms
          - OFF for at least 330ms
        then:
          - logger.log: "Botón presionado: Silenciando y Refrescando..."
          # CAMBIO CLAVE: Quitamos id(ns_logic) y usamos la instancia directa
          - lambda: |-
              if (NightscoutComponent::instance()->sgv_sensor->state > 200) {
                ESP_LOGD("Touch", "Glucosa alta detectada al presionar");
              }
          - light.turn_off: led_rgb         # Apagamos el LED de alerta
          - component.update: s3_box_lcd    # Refrescamos la pantalla
      
      # Un toque largo: Reiniciar el dispositivo
      - timing:
          - ON for at least 2s
        then:
          - logger.log: "Reinicio solicitado por toque largo"
          - button.press: restart_button


light:
  # 1. El BACKLIGHT (Lo que ilumina los números)
  - platform: monochromatic
    id: s3_box_lcd_backlight # Un ID único para la pantalla
    name: "Screen Backlight"
    output: backlight_output
    restore_mode: ALWAYS_ON

  # 2. El LIGHT STAR (El LED RGB que ilumina la carcasa)
  - platform: esp32_rmt_led_strip
    id: led_rgb 
    name: "LED Carcasa"
    pin: GPIO${led_pin}
    chipset: WS2812
    num_leds: 1
    rgb_order: grb
    effects:
      - pulse:
          name: "Slow Pulse"
      - pulse:
          name: "Fast Pulse"



media_player:
  - platform: speaker
    name: "SpecBall Speaker"
    id: glucose_speaker
    announcement_pipeline:
      speaker: i2s_audio_speaker # This points to the ID in your 'speaker:' section
      format: FLAC
#    files:
#      - id: alert_low
#        file: "assets/alert_low.flac"
#      - id: alert_high
#        file: "assets/alert_high.flac"




script:
  # Este script redibujará la pantalla cada vez que cambie la glucosa
  - id: draw_display
    then:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - if:
                condition:
                  wifi.connected:
                then:
                  # Aquí mostramos la página principal de Glucosa
                  - display.page.show: idle_page 
                  - component.update: s3_box_lcd
                else:
                  - display.page.show: no_wifi_page
                  - component.update: s3_box_lcd
          else:
            - display.page.show: initializing_page
            - component.update: s3_box_lcd

  # Script para sonar la alarma de glucosa
  - id: play_glucose_alert
    parameters:
      alert_type: string
    then:
      - if:
          condition:
            switch.is_off: mute_alarms
          then:
            - logger.log: "Sonando Alerta de Glucosa"
            # Aquí añadiremos la lógica para reproducir el archivo según alert_type

switch:
  # FISICO: Mantiene el amplificador del altavoz encendido
  - platform: gpio
    name: "Speaker Hardware Enable"
    id: speaker_enable
    pin: GPIO${speaker_enable_pin}
    restore_mode: ALWAYS_ON
    entity_category: config

  # LOGICO: Para silenciar las alarmas de glucosa desde el móvil
  - platform: template
    name: "Mute Glucose Alarms"
    id: mute_alarms
    icon: "mdi:volume-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config

  # LOGICO: Para apagar/encender la pantalla por la noche
  - platform: template
    name: "Show Glucose Display"
    id: show_text
    icon: "mdi:card-text-outline"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: draw_display
    on_turn_off:
      - script.execute: draw_display

  # LOGICO: Útil para ver si la SpecBall se está quedando sin batería
  - platform: template
    id: show_battery_status
    name: "Show Battery Status"
    icon: "mdi:battery"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: draw_display
    on_turn_off:
      - script.execute: draw_display
  # Para las unidades de glucosa
  - platform: template
    name: "Use mmol Units"
    id: unit_selector
    icon: "mdi:calculator"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - lambda: 'id(use_mmol) = true; id(s3_box_lcd).update();'
    on_turn_off:
      - lambda: 'id(use_mmol) = false; id(s3_box_lcd).update();'

globals:
  - id: use_mmol
    type: bool
    restore_value: true
    initial_value: "false" # Set to 'true' if you prefer mmol by default
  - id: init_in_progress
    type: bool
    restore_value: false
    initial_value: "true"
  - id: last_battery_percent
    type: int
    restore_value: no
    initial_value: '-1'
  - id: boot_sound_played
    type: bool
    restore_value: no
    initial_value: "false"
  - id: alarm_muted
    type: bool
    restore_value: no
    initial_value: 'false'
  # Added for your Diabetes alerts logic
  - id: glucose_alert_active
    type: bool
    restore_value: no
    initial_value: 'false'

