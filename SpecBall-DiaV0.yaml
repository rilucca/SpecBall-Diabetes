font:
  - file: "gfonts://Roboto"
    id: font_glucose
    size: 60
  - file: "gfonts://Roboto"
    id: font_dexcom
    size: 40
  - file: "gfonts://Roboto"
    id: font_main    # <--- This fixes the 'font_main' error
    size: 24
  - file: "gfonts://Roboto"
    id: font_small   # <--- This fixes the 'font_small' error
    size: 16
  - file: "gfonts://Roboto"
    id: font_timer
    size: 12


color:
  - id: my_red
    hex: "FF0000"
  - id: my_green
    hex: "00FF00"
  - id: my_yellow
    hex: "FFFF00"
  - id: my_white
    hex: "FFFFFF"
  - id: my_blue
    hex: "0000FF"
  - id: my_gray
    hex: "888888"
  - id: my_black   
    hex: "000000"

display:
  - platform: ili9xxx
    model: GC9A01A
    id: s3_box_lcd
    reset_pin: GPIO${lcd_reset_pin}
    cs_pin: GPIO${lcd_cs_pin}
    dc_pin: GPIO${lcd_dc_pin}
    spi_id: spi_bus
    invert_colors: ${invertcolors}
    data_rate: 40MHz
    dimensions:
        height: ${imageheight}
        width: ${imagewidth}
    pages:
      - id: idle_page
        lambda: |-
          // Fills background with black for better contrast
          it.fill(id(my_black)); 

          if (id(sgv_val).has_state()) {
            float val = id(sgv_val).state;
            Color current_color = id(my_white);

            // --- COLOR LOGIC (Rings) ---
            if (val < id(glucose_low_threshold).state) {
              current_color = id(my_red);
            } else if (val >= id(glucose_high_threshold).state) {
              current_color = id(my_yellow);
            } else {
              current_color = id(my_green);
            }

            // Draw outer range circles
            it.circle(120, 120, 115, current_color);
            it.circle(120, 120, 112, current_color);

            // --- DRAW GLUCOSE NUMBER ---
            if (id(use_mmol).state) {
              it.printf(120, 95, id(font_glucose), id(my_white), TextAlign::CENTER, "%.1f", val / 18.018f);
              it.printf(120, 145, id(font_main), current_color, TextAlign::CENTER, "mmol");
            } else {
              it.printf(120, 95, id(font_glucose), id(my_white), TextAlign::CENTER, "%.0f", val);
              it.printf(120, 145, id(font_main), current_color, TextAlign::CENTER, "mg-dL");
            }

            // --- DRAW TREND (Arrow Text) ---
            it.printf(120, 180, id(font_main), id(my_white), TextAlign::CENTER, "%s", id(trend_val).state.c_str());

          } else {
            it.printf(120, 120, id(font_main), id(my_white), TextAlign::CENTER, "Buscando...");
          }

          // --- BATTERY WIDGET ---
          if (id(show_battery_status).state) {
            it.printf(120, 35, id(font_small), id(my_gray), TextAlign::CENTER, "BAT: %.0f%%", id(battery_percentage).state);
          }

      - id: no_wifi_page
        lambda: |-
          it.fill(id(my_red));
          it.printf(120, 120, id(font_main), id(my_white), TextAlign::CENTER, "SIN WIFI");

      - id: initializing_page
        lambda: |-
          it.fill(id(my_blue));
          it.printf(120, 120, id(font_main), id(my_white), TextAlign::CENTER, "INICIANDO...");
          
# 1. TEXT SENSORS (Placed at the bottom of the file)
text_sensor:
  - platform: template
    name: "Glucose Trend"
    id: trend_val # This matches what we put in your nightscout.h

number:
  - platform: template
    name: "Umbral Bajo (Low)"
    id: glucose_low_threshold
    # Rango amplio para mg/dL o mmol
    min_value: 2.0
    max_value: 100.0
    step: 0.1
    initial_value: 70.0
    optimistic: true
    restore_value: true
    unit_of_measurement: "" # Se adapta visualmente
    on_value:
      then:
        - component.update: s3_box_lcd

  - platform: template
    name: "Umbral Alto (High)"
    id: glucose_high_threshold
    min_value: 5.0
    max_value: 300.0
    step: 1.0
    initial_value: 180.0
    optimistic: true
    restore_value: true
    on_value:
      then:
        - component.update: s3_box_lcd

  - platform: template
    name: "Alarma Crítica (Max)"
    id: glucose_max_threshold
    min_value: 10.0
    max_value: 400.0
    step: 1.0
    initial_value: 250.0
    optimistic: true
    restore_value: true
    on_value:
      then:
        - component.update: s3_box_lcd

interval:
  - interval: 5s # 5 segundos es suficiente para refrescar la interfaz y ahorrar CPU
    then:
      - lambda: |-
          // 1. REFRESH SCREEN IF SLIDERS MOVE (mg-dL o mmol)
          static float l_low = 0, l_high = 0, l_max = 0;
          if (id(glucose_low_threshold).state != l_low || id(glucose_high_threshold).state != l_high || id(glucose_max_threshold).state != l_max) {
            l_low = id(glucose_low_threshold).state;
            l_high = id(glucose_high_threshold).state;
            l_max = id(glucose_max_threshold).state;
            id(s3_box_lcd).update();
          }

          // 2. LOGICA DE ALERTAS VISUALES (LED Ring)
          if (id(sgv_val).has_state()) {
            float g_val = id(sgv_val).state;
            // Si usamos mmol en los sliders, multiplicamos por 18.018 para comparar con el SGV bruto (mg/dL)
            float low_t = id(use_mmol) ? id(glucose_low_threshold).state * 18.018f : id(glucose_low_threshold).state;
            float high_t = id(use_mmol) ? id(glucose_high_threshold).state * 18.018f : id(glucose_high_threshold).state;
            float max_t = id(use_mmol) ? id(glucose_max_threshold).state * 18.018f : id(glucose_max_threshold).state;

            // Solo encendemos el LED si NO está el Mute activado
            if (id(mute_alarms).state == false) {
              auto call = id(led_rgb).make_call(); // Asegúrate que el ID del LED sea 'led_rgb'
              
              if (g_val < low_t || g_val >= max_t) {
                // PELIGRO: Rojo
                call.set_rgb(1.0, 0.0, 0.0);
                call.set_brightness(1.0);
                call.perform();
              } else if (g_val >= high_t) {
                // ADVERTENCIA: Amarillo
                call.set_rgb(1.0, 1.0, 0.0);
                call.set_brightness(0.5);
                call.perform();
              } else {
                // RANGO SEGURO: Apagar LED
                call.set_state(false);
                call.perform();
              }
            } else {
              // Si Mute está ON, apagamos el LED
              id(led_rgb).make_call().set_state(false).perform();
            }
          }
